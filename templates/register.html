{% extends 'base.html' %}

{% block content %}
<h2>Register</h2>

<form method="POST">

    <input name="email" placeholder="Email"><br><br>
    <input type="password" name="password" placeholder="Password"><br><br>
    <button type="submit">Register</button>
</form>

<a href="/login">Login</a>
{% endblock %}
